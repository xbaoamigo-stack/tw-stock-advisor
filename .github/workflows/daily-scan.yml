name: daily-scan

on:
  schedule:
    # 08:30 Asia/Taipei (UTC+8) = 00:30 UTC, 週一到週五
    - cron: "30 0 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run analyze
        run: python scripts/analyze.py

      - name: Commit & push if changed
        run: |
          git config user.name "tw-stock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(data): daily scan $(date -u +'%Y-%m-%d')"
            git push
          fi
